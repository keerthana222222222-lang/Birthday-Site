<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    .container {
      padding-top: 80px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3em;
    }

    p {
      font-size: 1.2em;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4b7d;
      cursor: pointer;
      margin-top: 20px;
    }

    #surprise {
      margin-top: 20px;
      font-size: 1.4em;
    }

    /* Balloons */
    .balloon {
      position: absolute;
      bottom: -100px;
      width: 50px;
      height: 70px;
      border-radius: 50%;
      animation: float linear infinite;
      z-index: 1;
    }

    @keyframes float {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-120vh);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎉 Happy Birthday Vijay 🤝🎂</h1>

    <p>Wishing you happiness and joy on your special day!</p>

    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <div id="surprise"></div>
  </div>

  <script>
    function showSurprise() {
      document.getElementById("surprise").innerHTML =
        "Another year older, but not wiser 😜<br>Enjoy your day! 🎉";
    }

    // Balloons
    for (let i = 0; i < 12; i++) {
      let b = document.createElement("div");
      b.className = "balloon";

      b.style.left = Math.random() * 100 + "vw";
      b.style.backgroundColor =
        ["red", "blue", "yellow", "green", "purple"][Math.floor(Math.random() * 5)];

      b.style.animationDuration = (4 + Math.random() * 4) + "s";

      document.body.appendChild(b);
    }
  </script>

</body>
</html>
