<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    .container {
      padding-top: 80px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3.5em;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.3em;
      margin: 20px;
      animation: fadeIn 3s ease-in-out;
    }

    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4b7d;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    button:hover {
      background: #ffe6ec;
    }

    #surprise {
      margin-top: 20px;
      font-size: 1.5em;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* Floating balloons */
    .balloon {
      width: 50px;
      height: 70px;
      border-radius: 50%;
      position: absolute;
      bottom: -100px;
      animation: float linear infinite;
      z-index: 1;
      opacity: 0.9;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-110vh);
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎉 Happy Birthday Vijay!! 🤝🎂</h1>

  <p>
    Wishing you a day filled with happiness and a year filled with joy.
  </p>

  <button onclick="showSurprise()">Click for Surprise 🎁</button>

  <div id="surprise"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // Fix: Make function global
  window.showSurprise = function () {
    document.getElementById("surprise").innerHTML =
      "Another year older, but definitely not wiser 😜😂<br><br>Stay awesome 😎, keep smiling 😊, and enjoy your special day to the fullest ✨";
  };

  // Create balloons
  for (let i = 0; i < 15; i++) {
    let balloon = document.createElement("div");
    balloon.className = "balloon";

    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.backgroundColor =
      ["red", "blue", "yellow", "green", "purple", "orange"][Math.floor(Math.random() * 6)];

    balloon.style.animationDuration = (4 + Math.random() * 4) + "s";
    balloon.style.width = (40 + Math.random() * 20) + "px";
    balloon.style.height = (60 + Math.random() * 20) + "px";

    document.body.appendChild(balloon);
  }

});
</script>

</body>
</html>
