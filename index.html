<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    .container {
      padding-top: 80px;
    }

    h1 {
      font-size: 3.5em;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.3em;
      margin: 20px;
      animation: fadeIn 3s ease-in-out;
    }

    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4b7d;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    button:hover {
      background: #ffe6ec;
    }

    #surprise {
      margin-top: 20px;
      font-size: 1.5em;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* Floating balloons */
    .balloon {
      width: 50px;
      height: 70px;
      background: red;
      border-radius: 50%;
      position: absolute;
      bottom: -100px;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% {transform: translateY(0);}
      100% {transform: translateY(-100vh);}
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎉 Happy Birthday Vijay!!🤝🎂</h1>

  <p>
    Wishing you a day filled with happiness and a year filled with joy.
  
  </p>

  <button onclick="showSurprise()">Click for Surprise 🎁</button>

  <div id="surprise"></div>
</div>

<script>
function showSurprise() {
  document.getElementById("surprise").innerHTML =
   Another year older, but definitely not wiser 😜😂  
Stay awesome 😎, keep smiling 😊, and enjoy your special day to the fullest✨;
}

// Create balloons
for (let i = 0; i < 10; i++) {
  let balloon = document.createElement("div");
  balloon.className = "balloon";
  balloon.style.left = Math.random() * 100 + "vw";
  balloon.style.backgroundColor =
    ["red","blue","yellow","green","purple"][Math.floor(Math.random()*5)];
  balloon.style.animationDuration = (4 + Math.random()*3) + "s";
  document.body.appendChild(balloon);
}
</script>

</body>
</html>
